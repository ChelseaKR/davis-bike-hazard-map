name: workflow-lint

# SAST for the GitHub Actions workflows themselves (CICD-19, RTF-06). Runs
# zizmor against everything under .github/ whenever a workflow/action file
# changes, plus on main so drift is caught even without a workflow PR.
#
# Public repo (2026-07-19): `advanced-security: true` uploads zizmor's SARIF
# to GHAS code scanning so findings surface in the Security tab (and as
# code-scanning PR annotations). The action treats `advanced-security: true`
# and `annotations: true` as mutually exclusive — annotations come from code
# scanning in this mode — so `annotations` is explicitly false. zizmor itself
# still fails the job on any finding at/above `min-severity` regardless of the
# upload path, so this stays a real, blocking gate either way (this is the
# flip the 2026-07-05 remediation note deferred until the repo went public —
# P0-3/P0-2).
on:
  push:
    branches: [main]
    paths: ['.github/workflows/**', '.github/actions/**']
  pull_request:
    # No path filter: "zizmor (workflow SAST)" is a required status check in
    # the main ruleset, so the context must report on every PR — a
    # path-filtered run never reports and leaves non-workflow PRs unmergeable.

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor (workflow SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # SARIF upload to code scanning (public repo)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02  # v0.6.0
        with:
          inputs: .github/workflows
          min-severity: high
          advanced-security: true
          annotations: false
