name: secret-audit

# SEC-19: a scheduled, full-git-history verified-secrets scan. This
# complements the two diff-scoped gitleaks gates already in place (Gate 1:
# .husky/pre-commit; Gate 2: ci.yml's `security` job, which only diffs the
# current push/PR) by periodically re-scanning the *entire* history for
# credentials that were valid at commit time but weren't caught by either
# diff-scoped gate (e.g. a secret introduced before gitleaks was added, or
# force-push history rewrites). `--only-verified` keeps this low-noise: it
# only reports secrets TruffleHog could actively confirm are live, not every
# high-entropy string.
on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC (after CodeQL's 07:00 run)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: secret-audit
  cancel-in-progress: false

jobs:
  trufflehog:
    name: TruffleHog (full history, verified only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0 # full history — this is the point of the scheduled scan
          persist-credentials: false
      - name: TruffleHog full-history scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55  # v3.95.9
        with:
          version: 3.95.9
          extra_args: --only-verified
        # No `base`/`head` inputs on a `schedule`/`workflow_dispatch` run: the
        # action's own dispatch logic then scans the whole default-branch
        # history rather than a commit range, and `--fail` (always passed by
        # the action) makes the job exit non-zero on any verified hit.
