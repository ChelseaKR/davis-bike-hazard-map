name: CodeQL

# Static analysis (SAST) for JS/TS: runs on push/PR to main and weekly so new
# advisories are caught even without code changes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # Code scanning result upload needs GitHub Advanced Security, which private
    # repos don't have by default — the analysis runs but the upload 403s. Keep
    # this non-blocking until code scanning is enabled (repo Settings → Security)
    # or the repo is made public; then it surfaces results and can be required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
