name: CodeQL

# Static analysis (SAST) for JS/TS *and* the GitHub Actions workflows
# themselves (CICD-20): runs on PRs into main and weekly so new advisories
# are caught even without code changes. No push:main trigger — the PR run
# already covers every commit that lands on main (CI-CD-STANDARD §11e).
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `actions` scans the workflow YAML itself (CICD-20); no autobuild
        # needed for it since there's no code to compile.
        language: [javascript-typescript, actions]
    # NOTE (2026-07-05 remediation, P0-3/P1-2): this job used to set the
    # job-level escape hatch that silences a failure regardless of outcome
    # (spelled "continue" + "-on-error" + ": true" in YAML), which meant
    # CodeQL could never block a merge for ANY reason, including real
    # findings. That's fixed below: the analyze step writes SARIF locally and
    # a dedicated step parses it and fails the job on any error-level
    # (security) result — the blocking gate lives in-run, not in the upload.
    # Public repo (2026-07-19): `upload: always` also sends the SARIF to GHAS
    # code scanning so findings surface in the Security tab (visibility only;
    # the in-run gate is what blocks). Tracking issue:
    # audit-2026-07-05/davis-bike-hazard-map-REMEDIATION.md P0-3.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        if: matrix.language == 'javascript-typescript'
        uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4.37.3
      - name: Perform CodeQL analysis (SARIF uploaded to code scanning and written locally, see note above)
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          upload: always
          output: sarif-results
      - name: Enforce SAST gate on the parsed SARIF (SEC-08) — this is what actually blocks CI now
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(sarif-results/*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No SARIF output found from the CodeQL analyze step — treating as a failure rather than a silent pass."
            exit 1
          fi
          error_count=$(jq -s '[.[].runs[].results[]? | select(.level == "error")] | length' "${files[@]}")
          echo "CodeQL error-level (security) findings: ${error_count}"
          if [ "${error_count}" != "0" ]; then
            echo "::error::CodeQL found ${error_count} error-level security finding(s). Download the codeql-sarif artifact from this run to see them."
            exit 1
          fi
      - name: Upload SARIF as a build artifact (manual inspection alongside the code-scanning upload — see note above)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/
          if-no-files-found: warn
