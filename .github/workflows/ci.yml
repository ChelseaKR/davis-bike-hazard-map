name: CI

# Every push and PR runs the same gates `make verify` runs locally, plus the
# accessibility, end-to-end, security, and performance gates. A merge to main
# requires all required jobs green (enforce via branch protection).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Unit · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbhm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests (coverage-gated)
        # TEST_DATABASE_URL turns on the Postgres adapter integration tests.
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dbhm_test
        run: npm run test:coverage
      - name: Accessibility (axe, component-level)
        run: npm run a11y
      - name: Build
        run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node${{ matrix.node }}
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: End-to-end (Playwright + axe, 3 browsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run e2e (offline capture→sync + full-page a11y, all browsers)
        env:
          E2E_ALL_BROWSERS: '1'
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse performance budget
    runs-on: ubuntu-latest
    # Non-blocking for now (perf scores are noisy in CI); accessibility is the
    # hard gate via the axe e2e job. Promote to required once budgets settle.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI (budgets in lighthouserc.json)
        run: npx --yes @lhci/cli@0.14.x autorun

  security:
    name: Security (dependency audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Dependency audit (production deps, fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
