name: CI

# Every push and PR runs the same gates `make verify` runs locally, plus the
# accessibility, end-to-end, security, and performance gates. A merge to main
# requires all required jobs green (enforce via branch protection).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Unit · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Full compatibility range on PRs and main: the main ruleset requires
        # both "Node 20" and "Node 22" verify contexts, so a PR-only trim makes
        # every PR unmergeable (the required context never reports).
        node: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbhm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Lint CSS — logical properties (i18n G10, INTERNATIONALIZATION-STANDARD §4/§8)
        run: npm run lint:css
      - name: i18n gates — G1 utf8 · G2 extract+no-hardcoded · G3 bcp47 · G5/G6 parity · G12 cldr-pin
        run: npm run i18n:gates
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests (coverage-gated)
        # TEST_DATABASE_URL turns on the Postgres adapter integration tests.
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dbhm_test
        run: npm run test:coverage
      - name: Accessibility (axe, component-level)
        run: npm run a11y
      - name: Build
        run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-node${{ matrix.node }}
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: End-to-end (Chromium + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Run e2e (offline capture→sync + full-page a11y)
        env:
          E2E_BROWSERS: ${{ github.event_name == 'pull_request' && 'chromium' || 'chromium,firefox' }}
        run: npm run e2e
      - name: G9 pseudolocale overflow (en-XA, desktop + mobile — INTERNATIONALIZATION-STANDARD §4/§8)
        run: npm run e2e:i18n
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse performance budget
    runs-on: ubuntu-latest
    # Blocking now: accessibility is an error-level assertion (hard gate);
    # performance/FCP/TTI/byte-weight stay warn-level (advisory, noise-tolerant).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI (budgets in lighthouserc.json)
        run: npx --yes @lhci/cli@0.14.x autorun

  security:
    name: Security (dependency audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Dependency audit (production deps, fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
