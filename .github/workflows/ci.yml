name: CI

# Every push and PR runs the same gates `make verify` runs locally, plus the
# accessibility, end-to-end, security, and performance gates. A merge to main
# requires all required jobs green (enforce via branch protection).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Unit · Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dbhm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + integration tests (coverage-gated)
        # TEST_DATABASE_URL turns on the Postgres adapter integration tests.
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dbhm_test
        run: npm run test:coverage
      - name: Accessibility (axe, component-level)
        run: npm run a11y
      - name: Build
        run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-node${{ matrix.node }}
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: End-to-end (Chromium + Firefox)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Run e2e (offline capture→sync + full-page a11y)
        env:
          E2E_BROWSERS: chromium,firefox
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  e2e-webkit:
    name: End-to-end (WebKit, non-blocking)
    runs-on: ubuntu-latest
    # WebKit-on-Linux currently fails to render the shell in headless CI
    # (tracked). Kept visible but non-blocking so it never holds up a merge;
    # real Safari/iOS coverage is the manual SR/device pass before public launch.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright WebKit
        run: npx playwright install --with-deps webkit
      - name: Run e2e (WebKit)
        env:
          E2E_BROWSERS: webkit
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report-webkit
          path: playwright-report/
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse performance budget
    runs-on: ubuntu-latest
    # Blocking now: accessibility is an error-level assertion (hard gate);
    # performance/FCP/TTI/byte-weight stay warn-level (advisory, noise-tolerant).
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Lighthouse CI (budgets in lighthouserc.json)
        run: npx --yes @lhci/cli@0.14.x autorun

  security:
    name: Security (dependency audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Dependency audit (production deps, fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
