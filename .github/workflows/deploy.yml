name: Deploy (Fly.io)

# Auto-deploys the beta on every push to main, once a FLY_API_TOKEN secret is
# configured (Settings → Secrets and variables → Actions). Until then the
# deploy step is skipped cleanly, so this workflow stays green. Can also be run
# on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    name: Fly.io
    runs-on: ubuntu-latest
    # Gates production deploys behind a GitHub Environment (CICD-22). This
    # workflow edit alone does not add a required reviewer — that's a
    # repo-settings action (Settings → Environments → production → required
    # reviewers), not something this file can express; until it's configured
    # in the GitHub UI, referencing the environment here has no protective
    # effect beyond letting the Environment's URL/secrets scoping show up in
    # the run. See docs/ARCHITECTURE.md ADR-8 and
    # audit-2026-07-05/davis-bike-hazard-map-REMEDIATION.md P1-8.
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # v1
      - name: Deploy
        if: ${{ env.FLY_API_TOKEN != '' }}
        run: flyctl deploy --remote-only
      - name: Skipped (no token)
        if: ${{ env.FLY_API_TOKEN == '' }}
        run: echo "FLY_API_TOKEN not set — skipping deploy. See BETA.md to configure."
