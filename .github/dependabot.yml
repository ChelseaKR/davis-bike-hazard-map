version: 2
updates:
  # Application dependencies.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/test tooling into one PR to cut noise.
      dev-dependencies:
        dependency-type: development
    labels:
      - dependencies

  # GitHub Actions used by the workflows above.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
