# Local Postgres for development and integration tests.
#
#   docker compose up -d db
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dbhm npm run dev:server
#   TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/dbhm_test npm test
#
# The app itself runs from `make dev` / the Dockerfile; this file only provides
# the database dependency. (The app service is added in the deploy setup.)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dbhm
    ports:
      - '5432:5432'
    volumes:
      - dbhm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbhm-pgdata:
